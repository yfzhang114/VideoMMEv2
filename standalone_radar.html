<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Standalone Capability Radar</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts/dist/echarts.min.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans SC", sans-serif;
            background-color: #f8fafc;
            padding: 2rem;
            margin: 0;
        }
        .capability-radar-shell {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0.65rem 1.25rem 0.05rem;
            border: 1px solid #e5e7eb;
            border-radius: 20px;
            background: #ffffff;
            box-shadow: 0 4px 20px rgba(15, 23, 42, 0.05);
        }
        .capability-radar-levels {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-bottom: 0.2rem;
            margin-top: 1rem;
        }
        .capability-level-pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 14px;
            border-radius: 999px;
            border: 1px solid #d1d5db;
            background: rgba(255,255,255,0.92);
            font-size: 0.88rem;
            font-weight: 600;
            color: #475569;
            box-shadow: 0 6px 18px rgba(15, 23, 42, 0.06);
        }
        .capability-level-pill .swatch {
            width: 12px;
            height: 12px;
            border-radius: 999px;
            flex: 0 0 auto;
        }
        .capability-level-pill.level-1 .swatch { background: #E4F3DD; }
        .capability-level-pill.level-2 .swatch { background: #E0EDF5; }
        .capability-level-pill.level-3 .swatch { background: #FCE2D1; }
        .capability-radar-chart {
            width: 100%;
            height: 550px;
        }
        @media (max-width: 768px) {
            .capability-radar-shell {
                padding: 1rem 0.65rem 0.5rem;
                border-radius: 16px;
            }
            .capability-radar-chart {
                height: 550px;
            }
            .capability-level-pill {
                font-size: 0.8rem;
                padding: 7px 12px;
            }
        }
    </style>
</head>
<body>

<div class="capability-radar-shell">
    <div class="capability-radar-levels">
        <div class="capability-level-pill level-1">
            <span class="swatch"></span>
            <span>Level 1: Retrieval & Aggregation</span>
        </div>
        <div class="capability-level-pill level-2">
            <span class="swatch"></span>
            <span>Level 2: Temporal Understanding</span>
        </div>
        <div class="capability-level-pill level-3">
            <span class="swatch"></span>
            <span>Level 3: Complex Reasoning</span>
        </div>
    </div>
    <div id="radar-chart" class="capability-radar-chart" aria-label="Capability radar chart"></div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {
  const chartDom = document.getElementById("radar-chart");
  if (!chartDom) return;

  // Add html2canvas library for PNG export
  const script = document.createElement('script');
  script.src = "https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js";
  document.head.appendChild(script);

  const myChart = echarts.init(chartDom, null, { renderer: "svg", devicePixelRatio: 2 });
  
  const categories = [
    { display: "Frame-Only", tooltip: "Frame-Only" },
    { display: "Frames & Audio", tooltip: "Frames & Audio" },
    { display: "Action & Motion", tooltip: "Action & Motion" },
    { display: "Order", tooltip: "Order" },
    { display: "Change", tooltip: "Change" },
    { display: "Temporal\nReasoning", tooltip: "Temporal Reasoning" },
    { display: "Complex Plot\nComprehension", tooltip: "Complex Plot Comprehension" },
    { display: "Video-Based\nKnowledge Acquisition", tooltip: "Video-Based Knowledge Acquisition" },
    { display: "Social Behavior\nAnalysis", tooltip: "Social Behavior Analysis" },
    { display: "Physical World\nReasoning", tooltip: "Physical World Reasoning" },
  ];

  const cwIndices = [0, 9, 8, 7, 6, 5, 4, 3, 2, 1];
  const indicatorNames = cwIndices.map((i) => categories[i].display);
  const numAxes = categories.length;

  const orderedModels = [
    "Human Expert",
    "Gemini-3-Pro",
    "Qwen3.5-397B-A17B-Think",
    "GPT-5",
    "Qwen3-Omni-30B-A3B-Instruct"
  ];

  const colors = {
    "Human Expert": "#8E9EAB",
    "Gemini-3-Pro": "#7C9885",
    "Qwen3.5-397B-A17B-Think": "#B59E75",
    "GPT-5": "#D9A05B",
    "Qwen3-Omni-30B-A3B-Instruct": "#798A9F",
  };

  const legendLabels = {
    "Human Expert": "Human Expert",
    "Gemini-3-Pro": "Gemini-3-Pro",
    "Qwen3.5-397B-A17B-Think": "Qwen3.5-397B-A17B\nThink",
    "GPT-5": "GPT-5",
    "Qwen3-Omni-30B-A3B-Instruct": "Qwen3-Omni-30B-A3B\nInstruct",
  };

  let userLegendState = {
    "Human Expert": true,
    "Gemini-3-Pro": true,
    "Qwen3.5-397B-A17B-Think": true,
    "GPT-5": true,
    "Qwen3-Omni-30B-A3B-Instruct": true,
  };

  const rawData = [
    {
      name: "Human Expert",
      value: [96.1589, 93.6332, 89.0858, 92.9444, 95.1923, 87.2727, 87.0929, 89.9665, 91.6111, 84.1246]
    },
    {
      name: "Gemini-3-Pro",
      value: [47.1, 68.26, 24.14, 55.41, 43.63, 43.17, 36.53, 44.26, 36.43, 20.94],
    },
    {
      name: "GPT-5",
      value: [27.34, 32.65, 15.22, 29.78, 31.73, 26.66, 22.24, 26.44, 19.83, 15.05],
    },
    {
      name: "Qwen3-Omni-30B-A3B-Instruct",
      value: [19.28, 23.8, 11.38, 19.16, 11.18, 17.2, 17.65, 18.3, 18.02, 10.92],
    },
    {
      name: "Qwen3.5-397B-A17B-Think",
      value: [26.17, 41.70, 18.56, 52.58, 34.74, 37.60, 24.12, 40.15, 25.88, 15.87],
    },
  ];

  const modelNames = orderedModels;
  let hoveredAxisIndex = 0;
  let currentHighlight = null;
  let resizeTimer = null;

  function getLayout() {
    const mobile = chartDom.clientWidth <= 860;
    return {
      mobile,
      center: mobile ? ["50%", "40%"] : ["38%", "48%"],
      radarRadius: mobile ? "59%" : "64%",
      ringInnerRadius: mobile ? "61%" : "66%",
      ringOuterRadius: mobile ? "69%" : "74%",
      legend: mobile
        ? {
            type: "scroll",
            orient: "horizontal",
            left: "center",
            top: "73%",
            width: "92%",
            itemGap: 10,
          }
        : {
            type: "plain",
            orient: "vertical",
            left: "75%",
            top: "middle",
            width: "22%",
            itemGap: 12,
          },
      nameGap: mobile ? 18 : 22,
      labelFontSize: mobile ? 11 : 12,
      legendFontSize: mobile ? 10.5 : 11.5,
      ringGapSize: mobile ? 5 : 8,
      symbolSize: mobile ? 6 : 7,
    };
  }

  function percentToPixel(value, total) {
    if (typeof value === "string" && value.endsWith("%")) {
      return (parseFloat(value) / 100) * total;
    }
    return Number(value);
  }

  function getRadarCenterPixels(layout) {
    return {
      x: percentToPixel(layout.center[0], myChart.getWidth()),
      y: percentToPixel(layout.center[1], myChart.getHeight()),
    };
  }

  function updateHoveredAxisIndex(params) {
    const layout = getLayout();
    const center = getRadarCenterPixels(layout);
    const dx = params.offsetX - center.x;
    const dy = params.offsetY - center.y;
    let angle = Math.atan2(dy, dx) + Math.PI / 2;
    if (angle < 0) angle += Math.PI * 2;
    const sliceAngle = (Math.PI * 2) / numAxes;
    hoveredAxisIndex = Math.round((Math.PI * 2 - angle) / sliceAngle) % numAxes;
  }

  function buildSeriesData(highlightedModel) {
    return orderedModels.map((modelName) => {
      const item = rawData.find(d => d.name === modelName);
      const isHighlighted = highlightedModel === item.name;
      const dimOthers = Boolean(highlightedModel) && !isHighlighted;
      const orderedValues = cwIndices.map((index) => item.value[index]);
      const isHumanExpert = item.name === "Human Expert";

      return {
        name: item.name,
        value: orderedValues,
        meta: item.meta,
        symbol: "circle",
        symbolSize: getLayout().symbolSize,
        itemStyle: {
          color: colors[item.name],
          opacity: dimOthers ? 0.22 : 1,
          borderColor: "#ffffff",
          borderWidth: isHumanExpert ? 1.6 : isHighlighted ? 1.2 : 0.8,
        },
        lineStyle: {
          color: colors[item.name],
          width: isHumanExpert ? 3.2 : isHighlighted ? 4 : 2.5,
          opacity: dimOthers ? 0.18 : 0.96,
          shadowBlur: isHighlighted || isHumanExpert ? 14 : 0,
          shadowColor: isHighlighted || isHumanExpert ? colors[item.name] : "transparent",
        },
        areaStyle: {
          color: colors[item.name],
          opacity: isHumanExpert ? 0.05 : isHighlighted ? 0.2 : dimOthers ? 0.03 : 0.08,
        },
      };
    });
  }

  function buildOption() {
    const layout = getLayout();

    return {
      toolbox: {
        feature: {
          myDownload: {
            show: true,
            title: 'Download Image',
            icon: 'path://M4.7,22.9L29.3,45.5L54.7,23.4M4.6,43.6L4.6,58L53.8,58L53.8,43.6M29.2,45.1L29.2,0',
            onclick: function() {
                myChart.setOption(buildOption());
                
                // Temporarily hide the download button
                const option = myChart.getOption();
                option.toolbox[0].feature.myDownload.show = false;
                myChart.setOption(option);
                
                // Use html2canvas to capture the entire shell as PNG
                const element = document.querySelector('.capability-radar-shell');
                html2canvas(element, { scale: 3, backgroundColor: '#ffffff', useCORS: true }).then(canvas => {
                    const link = document.createElement('a');
                    link.download = 'Video-MME-v2-Capability-Radar.png';
                    link.href = canvas.toDataURL('image/png');
                    link.click();
                    
                    // Restore the download button
                    option.toolbox[0].feature.myDownload.show = true;
                    myChart.setOption(option);
                });
            }
          }
        },
        right: 20,
        top: 10
      },
      animationDuration: 500,
      color: modelNames.map((name) => colors[name]),
      tooltip: {
        trigger: "item",
        confine: true,
        backgroundColor: "rgba(255,255,255,0.96)",
        borderColor: "#d1d5db",
        borderWidth: 1,
        textStyle: {
          color: "#111827",
          fontSize: 12,
        },
        formatter: function (params) {
          if (!Array.isArray(params.value)) return params.name;
          const idx = hoveredAxisIndex || 0;
          const value = Number(params.value[idx]).toFixed(2);
          const overall = params.data && params.data.meta && typeof params.data.meta.overallAcc === "number"
            ? `<div style="margin-top:4px; color:#6b7280;">Overall Acc: ${(params.data.meta.overallAcc * 100).toFixed(2)}</div>`
            : "";
          return [
            "<div style=\"min-width:180px;\">",
            `<div style="font-weight:700; margin-bottom:4px;">${params.name}</div>`,
            `<div style="color:#4b5563;">${indicatorNames[idx]}</div>`,
            `<div style="margin-top:4px; color:${colors[params.name]}; font-weight:700;">${value}</div>`,
            overall,
            "</div>",
          ].join("");
        },
      },
      legend: {
        ...layout.legend,
        icon: "circle",
        itemWidth: 12,
        itemHeight: 12,
        align: "left",
        padding: layout.mobile ? [10, 12] : [18, 18],
        backgroundColor: "rgba(255,255,255,0.94)",
        borderColor: "#d6d9de",
        borderWidth: 1,
        borderRadius: 14,
        shadowBlur: 18,
        shadowColor: "rgba(15, 23, 42, 0.08)",
        selected: userLegendState,
        data: modelNames,
        formatter: function (name) {
          return legendLabels[name] || name;
        },
        textStyle: {
          fontSize: layout.legendFontSize,
          color: "#2f3b44",
          lineHeight: layout.mobile ? 16 : 18,
          width: layout.mobile ? 96 : 150,
          overflow: "break",
        },
      },
      radar: {
        z: 3,
        center: layout.center,
        radius: layout.radarRadius,
        shape: "polygon",
        splitNumber: 5,
        nameGap: layout.nameGap,
        axisName: {
          color: "#334155",
          fontWeight: 700,
          fontSize: layout.labelFontSize,
          backgroundColor: "rgba(255,255,255,0.95)",
          borderColor: "#d1d5db",
          borderWidth: 1,
          borderRadius: 6,
          padding: layout.mobile ? [4, 7] : [3, 6],
          lineHeight: layout.mobile ? 14 : 16,
        },
        splitArea: {
          areaStyle: {
            color: ["rgba(255,255,255,0.00)"],
          },
        },
        splitLine: {
          lineStyle: {
            color: "#d5dbe3",
            type: "dashed",
            width: 1,
          },
        },
        axisLine: {
          lineStyle: {
            color: "#d5dbe3",
            type: "dashed",
            width: 1,
          },
        },
        indicator: indicatorNames.map((name) => ({
          name: name,
          max: 90,
        })),
      },
      series: [
        {
          type: "pie",
          z: 1,
          radius: [layout.ringInnerRadius, layout.ringOuterRadius],
          center: layout.center,
          startAngle: 90 + 180 / numAxes,
          clockwise: true,
          silent: true,
          label: { show: false },
          itemStyle: {
            borderColor: "#ffffff",
            borderWidth: layout.ringGapSize,
          },
          data: [
            {
              value: 2,
              name: "Level 1",
              itemStyle: { color: "#E4F3DD" },
            },
            {
              value: 4,
              name: "Level 2",
              itemStyle: { color: "#E0EDF5" },
            },
            {
              value: 4,
              name: "Level 3",
              itemStyle: { color: "#FCE2D1" },
            },
          ],
        },
        {
          name: "Model Performance",
          type: "radar",
          z: 5,
          data: buildSeriesData(currentHighlight),
          emphasis: {
            disabled: true,
          },
        },
      ],
    };
  }

  function renderChart() {
    myChart.setOption(buildOption(), true);
  }

  function highlightModel(modelName) {
    if (currentHighlight === modelName) return;
    currentHighlight = modelName;
    myChart.setOption({
      series: [{}, { data: buildSeriesData(modelName) }],
    });
  }

  function restoreModels() {
    if (!currentHighlight) return;
    currentHighlight = null;
    myChart.setOption({
      series: [{}, { data: buildSeriesData(null) }],
    });
  }

  myChart.getZr().on("mousemove", updateHoveredAxisIndex);

  myChart.on("legendselectchanged", function (params) {
    userLegendState = { ...params.selected };
    if (currentHighlight && userLegendState[currentHighlight] === false) {
      restoreModels();
    }
  });

  myChart.on("mouseover", function (params) {
    if (params.seriesType === "radar" && modelNames.includes(params.name)) {
      highlightModel(params.name);
    }
  });

  myChart.on("mouseout", function (params) {
    if (params.seriesType === "radar" && modelNames.includes(params.name)) {
      restoreModels();
    }
  });

  window.addEventListener("resize", function () {
    clearTimeout(resizeTimer);
    resizeTimer = window.setTimeout(function () {
      myChart.resize();
      renderChart();
    }, 120);
  });

  renderChart();
});
</script>
</body>
</html>
